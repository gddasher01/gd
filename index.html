<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; color: #eee; font-family: Arial, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #app { width: 900px; height: 600px; display: flex; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
        #setup { width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; padding: 40px; }
        #setup h1 { color: #0af; font-size: 28px; }
        #setup input { background: #222; border: 1px solid #444; color: #fff; padding: 10px 15px; border-radius: 6px; font-size: 16px; width: 250px; text-align: center; outline: none; }
        #setup input:focus { border-color: #0af; }
        .btn { background: #0af; color: #fff; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn:hover { background: #08d; }
        .btn-red { background: #d44; } .btn-red:hover { background: #b22; }
        .btn-small { padding: 6px 14px; font-size: 12px; }
        .btn-green { background: #0a6; } .btn-green:hover { background: #085; }
        #avatars { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 350px; }
        .av { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; background: #333; color: #fff; }
        .av:hover { border-color: #0af; } .av.sel { border-color: #0af; background: #0af; }
        #sidebar { width: 260px; background: #151515; border-right: 1px solid #333; display: none; flex-direction: column; }
        #sideHead { padding: 12px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        #myAv { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; background: #0af; flex-shrink: 0; }
        #myNm { font-size: 14px; font-weight: bold; color: #0af; }
        #myUser { font-size: 11px; color: #666; cursor: pointer; }
        #newBtn { margin: 10px 12px; background: #0a6; color: #fff; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        #chats { flex: 1; overflow-y: auto; }
        .ci { padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #222; }
        .ci:hover { background: #222; } .ci.act { background: #1a2a3a; border-left: 3px solid #0af; }
        .ci-av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; background: #333; flex-shrink: 0; }
        .ci-info { flex: 1; min-width: 0; }
        .ci-name { font-size: 13px; font-weight: bold; }
        .ci-last { font-size: 11px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .unread { background: #0af; color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 8px; }
        #main { flex: 1; display: none; flex-direction: column; }
        #mHead { padding: 10px 15px; background: #1e1e1e; border-bottom: 1px solid #333; display: none; align-items: center; gap: 10px; }
        #mAv { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; background: #333; }
        #mName { font-size: 14px; font-weight: bold; }
        #mInfo { font-size: 10px; color: #666; cursor: pointer; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: none; flex-direction: column; gap: 8px; }
        #msgs::-webkit-scrollbar { width: 5px; } #msgs::-webkit-scrollbar-thumb { background: #444; }
        .m { max-width: 65%; padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.4; word-wrap: break-word; }
        .m-me { align-self: flex-end; background: #0af; color: #fff; border-bottom-right-radius: 2px; }
        .m-them { align-self: flex-start; background: #2a2a2a; color: #ddd; border-bottom-left-radius: 2px; }
        .m-name { font-size: 10px; color: #aaa; margin-bottom: 2px; }
        .m-time { font-size: 9px; color: #aaa; margin-top: 3px; } .m-me .m-time { text-align: right; }
        .m img { max-width: 250px; max-height: 200px; border-radius: 6px; margin-top: 4px; cursor: pointer; }
        .m video { max-width: 250px; max-height: 200px; border-radius: 6px; margin-top: 4px; }
        .m audio { margin-top: 4px; width: 200px; }
        .fl { display: inline-block; background: rgba(255,255,255,0.1); padding: 6px 10px; border-radius: 6px; margin-top: 4px; color: #0cf; text-decoration: none; font-size: 12px; }
        #empty { flex: 1; display: flex; justify-content: center; align-items: center; color: #444; font-size: 16px; }
        #inputBar { padding: 10px 15px; background: #1e1e1e; border-top: 1px solid #333; display: none; gap: 8px; }
        #msgIn { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 13px; outline: none; resize: none; height: 38px; }
        #msgIn:focus { border-color: #0af; }
        #fileIn { display: none; }
        .btn-file { background: #a0f; padding: 8px 10px; font-size: 16px; }
        #modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
        .mod { background: #1e1e1e; padding: 20px; border-radius: 8px; width: 300px; }
        .mod h3 { margin-bottom: 12px; color: #0af; font-size: 16px; }
        .mod input, .mod textarea { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 13px; outline: none; margin-bottom: 8px; }
        .mod textarea { resize: none; height: 60px; font-family: Arial, sans-serif; }
        .mod-btns { display: flex; gap: 8px; justify-content: flex-end; }
        .mod-tabs { display: flex; gap: 5px; margin-bottom: 12px; }
        .mod-tab { background: #333; color: #888; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .mod-tab.act { background: #0af; color: #fff; }
        #preview { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; cursor: pointer; }
        #preview img { max-width: 90%; max-height: 90%; }
        #status { position: fixed; top: 5px; right: 5px; font-size: 10px; padding: 3px 8px; border-radius: 4px; z-index: 1000; }
        .st-ok { background: #0a6; color: #fff; }
        .st-err { background: #d44; color: #fff; }
        .st-wait { background: #a60; color: #fff; }
        #requests { border-bottom: 1px solid #333; }
        .req { padding: 10px 12px; display: flex; align-items: center; gap: 8px; background: #1a1a2a; border-bottom: 1px solid #222; }
        .req-av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; background: #333; flex-shrink: 0; }
        .req-info { flex: 1; }
        .req-name { font-size: 13px; font-weight: bold; color: #f0a030; }
        .req-msg { font-size: 11px; color: #aaa; margin-top: 2px; font-style: italic; }
        .req-btns { display: flex; gap: 5px; }
        #log { position: fixed; bottom: 0; left: 0; right: 0; background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 8px; max-height: 150px; overflow-y: auto; z-index: 999; display: none; }
        #logBtn { position: fixed; bottom: 5px; right: 5px; background: #333; color: #fff; border: none; padding: 5px 10px; font-size: 10px; cursor: pointer; z-index: 1000; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="setup">
            <h1>P2P Chat</h1>
            <p style="color:#888;font-size:13px;margin-bottom:10px">Username + Chat</p>
            <div id="avatars"></div>
            <input type="text" id="nameIn" placeholder="Dein Name" maxlength="20">
            <input type="text" id="userIn" placeholder="Username (z.B. max123)" maxlength="15">
            <button class="btn" id="startBtn">Starten</button>
        </div>
        <div id="sidebar">
            <div id="sideHead">
                <div id="myAv"></div>
                <div><div id="myNm"></div><div id="myUser" title="Klicken zum Kopieren"></div></div>
            </div>
            <button id="newBtn" onclick="openModal()">+ Neuer Chat</button>
            <div id="requests"></div>
            <div id="chats"></div>
        </div>
        <div id="main">
            <div id="mHead"><div id="mAv"></div><div><div id="mName"></div><div id="mInfo"></div></div><button class="btn btn-small btn-red" onclick="delChat()" style="margin-left:auto">X</button></div>
            <div id="empty">Chat auswaehlen</div>
            <div id="msgs"></div>
            <div id="inputBar">
                <input type="file" id="fileIn">
                <button class="btn btn-file" onclick="document.getElementById('fileIn').click()">&#128206;</button>
                <textarea id="msgIn" placeholder="Nachricht..." rows="1"></textarea>
                <button class="btn" onclick="send()">Senden</button>
            </div>
        </div>
        <div id="modal">
            <div class="mod">
                <div class="mod-tabs">
                    <button class="mod-tab act" onclick="switchTab('privat')">Privat</button>
                    <button class="mod-tab" onclick="switchTab('gruppe')">Gruppe</button>
                </div>
                <div id="tabPrivat">
                    <input type="text" id="modalUser" placeholder="Username eingeben">
                    <textarea id="modalMsg" placeholder="Nachricht (optional)"></textarea>
                </div>
                <div id="tabGruppe" style="display:none">
                    <input type="text" id="modalRoom" placeholder="Gruppen-Code (z.B. schule2024)">
                </div>
                <div class="mod-btns"><button class="btn btn-small" onclick="closeModal()">Abbrechen</button><button class="btn btn-small btn-green" onclick="doJoin()">Verbinden</button></div>
            </div>
        </div>
        <div id="preview" onclick="this.style.display='none'"><img></div>
    </div>
    <div id="status" class="st-wait">Verbinde...</div>
    <div id="log"></div>
    <button id="logBtn" onclick="toggleLog()">LOG</button>

    <script>
        const COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#00bcd4','#8bc34a'];
        let sb = null, myName, myAv, myId, myUsername;
        let chats = {}, active = null, channels = {};
        let requests = {};
        let currentTab = 'privat';

        function gs(k, d) { try { return JSON.parse(localStorage.getItem(k)) || d } catch { return d } }
        function ss(k, v) { localStorage.setItem(k, JSON.stringify(v)) }
        function genId() { return Math.random().toString(36).substr(2, 9); }
        function log(msg) { const el = document.getElementById('log'); el.innerHTML += '<div>' + new Date().toLocaleTimeString() + ' ' + msg + '</div>'; el.scrollTop = el.scrollHeight; console.log(msg); }
        function toggleLog() { const el = document.getElementById('log'); el.style.display = el.style.display === 'none' ? 'block' : 'none'; }

        function initAv() {
            const el = document.getElementById('avatars'); el.innerHTML = '';
            for (let i = 0; i < 26; i++) {
                const c = String.fromCharCode(65 + i);
                const d = document.createElement('div');
                d.className = 'av'; d.textContent = c; d.style.background = COLORS[i % COLORS.length];
                d.onclick = () => { el.querySelectorAll('.av').forEach(a => a.classList.remove('sel')); d.classList.add('sel'); };
                el.appendChild(d);
            }
        }

        function initSupabase() {
            const status = document.getElementById('status');
            log('Supabase wird initialisiert...');
            try {
                if (typeof supabase === 'undefined') {
                    log('FEHLER: supabase Bibliothek nicht geladen!');
                    status.textContent = 'Bibliothek nicht geladen';
                    status.className = 'st-err';
                    return;
                }
                log('supabase Objekt gefunden: ' + typeof supabase.createClient);
                sb = supabase.createClient(
                    'https://jrhzqntlihqdwjuvefow.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpyaHpxbnRsaWhxZHdqdXZlZm93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3MzE3NzAsImV4cCI6MjEwMDMwNzc3MH0.dGGxrVBHN3rCWDRjY7lMnNN5tb_vpfJpHA7olLageBU'
                );
                log('Supabase Client erstellt!');
                status.textContent = 'Verbunden';
                status.className = 'st-ok';
            } catch(e) {
                log('FEHLER beim Erstellen: ' + e.message);
                status.textContent = 'Fehler: ' + e.message;
                status.className = 'st-err';
            }
        }

        function start() {
            myName = document.getElementById('nameIn').value.trim();
            myUsername = document.getElementById('userIn').value.trim().toLowerCase();
            const sel = document.querySelector('.av.sel');
            if (!myName) { alert('Name eingeben'); return; }
            if (!myUsername) { alert('Username eingeben'); return; }
            if (!sel) { alert('Avatar waehlen'); return; }
            myAv = sel.textContent;
            myId = genId();
            ss('c_name', myName); ss('c_av', myAv); ss('c_id', myId); ss('c_user', myUsername);
            go();
        }

        function go() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('main').style.display = 'flex';
            document.getElementById('myNm').textContent = myName;
            document.getElementById('myAv').textContent = myAv;
            document.getElementById('myAv').style.background = COLORS[myAv.charCodeAt(0) - 65] || '#333';
            document.getElementById('myUser').textContent = '@' + myUsername;
            document.getElementById('myUser').onclick = () => {
                navigator.clipboard.writeText(myUsername);
                document.getElementById('myUser').textContent = 'Kopiert!';
                setTimeout(() => document.getElementById('myUser').textContent = '@' + myUsername, 1500);
            };
            chats = gs('c_chats', {}); requests = gs('c_reqs', {});
            renderList(); renderReqs();
            initSupabase();
            setTimeout(() => {
                if (sb) {
                    subscribeRoom('user-' + myUsername);
                    log('Eigenen Username-Raum abonniert: user-' + myUsername);
                }
            }, 500);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.mod-tab').forEach(t => t.classList.remove('act'));
            if (tab === 'privat') {
                document.querySelector('.mod-tab:first-child').classList.add('act');
                document.getElementById('tabPrivat').style.display = 'block';
                document.getElementById('tabGruppe').style.display = 'none';
            } else {
                document.querySelector('.mod-tab:last-child').classList.add('act');
                document.getElementById('tabPrivat').style.display = 'none';
                document.getElementById('tabGruppe').style.display = 'block';
            }
        }

        function doJoin() {
            if (currentTab === 'privat') joinPrivate();
            else joinGroup();
        }

        function joinPrivate() {
            const username = document.getElementById('modalUser').value.trim().toLowerCase();
            const msg = document.getElementById('modalMsg').value.trim();
            if (!username) return;
            if (username === myUsername) { alert('Du kannst nicht mit dir selbst chatten'); return; }
            closeModal();
            if (!sb) { alert('Nicht verbunden!'); return; }
            const chatId = [myUsername, username].sort().join('_');
            log('Privater Chat mit: ' + username + ' (chatId: ' + chatId + ')');
            subscribeRoom('user-' + username);
            setTimeout(() => {
                const ch = channels['user-' + username];
                if (ch) {
                    log('Sende Anfrage an user-' + username);
                    ch.send({ type: 'broadcast', event: 'request', payload: { from: myUsername, name: myName, av: myAv, msg: msg } });
                } else {
                    log('FEHLER: Kein Channel fuer user-' + username);
                }
            }, 1000);
            if (!chats[chatId]) {
                chats[chatId] = { id: chatId, name: username, type: 'privat', username: username, msgs: [], last: '', time: Date.now(), un: 0, accepted: false };
                ss('c_chats', chats); renderList();
            }
            document.getElementById('empty').textContent = 'Warte auf Annahme...';
        }

        function joinGroup() {
            const code = document.getElementById('modalRoom').value.trim().toLowerCase();
            if (!code) return;
            closeModal();
            if (!sb) { alert('Nicht verbunden!'); return; }
            subscribeRoom('grp-' + code);
            if (!chats['grp-' + code]) {
                chats['grp-' + code] = { id: 'grp-' + code, name: 'Gruppe ' + code, type: 'gruppe', room: code, msgs: [], last: '', time: Date.now(), un: 0, accepted: true };
                ss('c_chats', chats); renderList();
            }
            open('grp-' + code);
        }

        function subscribeRoom(room) {
            if (channels[room]) { log('Channel existiert bereits: ' + room); return; }
            log('Abonniere Channel: ' + room);
            const ch = sb.channel(room, { config: { broadcast: { self: false } } });
            ch.on('broadcast', { event: 'msg' }, payload => {
                const d = payload.payload;
                log('Nachricht empfangen in ' + room + ' von ' + d.from);
                if (d.from === myUsername) return;
                const chatId = findChatId(room, d.from);
                if (chatId && chats[chatId]) {
                    addMsg(chatId, d.text, false, d.name, d.av, d.file);
                }
            });
            ch.on('broadcast', { event: 'request' }, payload => {
                const d = payload.payload;
                log('Anfrage empfangen von ' + d.from);
                if (d.from === myUsername) return;
                const chatId = [myUsername, d.from].sort().join('_');
                if (!chats[chatId]) {
                    chats[chatId] = { id: chatId, name: d.from, type: 'privat', username: d.from, msgs: [], last: '', time: Date.now(), un: 0, accepted: false };
                }
                requests[chatId] = { chatId: chatId, from: d.from, name: d.name, av: d.av, msg: d.msg || '', time: Date.now() };
                ss('c_reqs', requests); ss('c_chats', chats); renderList(); renderReqs();
            });
            ch.on('broadcast', { event: 'accept' }, payload => {
                const d = payload.payload;
                log('Annahme empfangen von ' + d.from);
                if (d.from === myUsername) return;
                const chatId = [myUsername, d.from].sort().join('_');
                if (chats[chatId]) {
                    chats[chatId].accepted = true;
                    ss('c_chats', chats); renderList();
                    if (active === chatId) open(chatId);
                }
            });
            ch.subscribe((status) => {
                log('Channel Status: ' + status + ' fuer ' + room);
                if (status === 'SUBSCRIBED') {
                    log('Erfolgreich abonniert: ' + room);
                }
            });
            channels[room] = ch;
        }

        function findChatId(room, from) {
            if (room.startsWith('grp-')) return room;
            return [myUsername, from].sort().join('_');
        }

        function acceptReq(chatId) {
            const req = requests[chatId]; if (!req) return;
            if (chats[chatId]) {
                chats[chatId].accepted = true;
                if (req.msg) {
                    chats[chatId].msgs.push({ text: req.msg, me: false, name: req.name, av: req.av, time: Date.now() });
                    chats[chatId].last = req.msg;
                }
            }
            delete requests[chatId];
            ss('c_reqs', requests); ss('c_chats', chats); renderList(); renderReqs();
            subscribeRoom('user-' + req.from);
            setTimeout(() => {
                const ch = channels['user-' + req.from];
                if (ch) {
                    log('Sende Annahme an user-' + req.from);
                    ch.send({ type: 'broadcast', event: 'accept', payload: { from: myUsername } });
                }
            }, 1000);
            open(chatId);
        }

        function rejectReq(chatId) {
            delete requests[chatId];
            ss('c_reqs', requests); renderReqs();
        }

        function open(pid) {
            active = pid; const c = chats[pid]; if (!c) return;
            c.un = 0; save(); renderList();
            if (!c.accepted) {
                document.getElementById('mHead').style.display = 'none';
                document.getElementById('msgs').style.display = 'none';
                document.getElementById('inputBar').style.display = 'none';
                document.getElementById('empty').style.display = 'flex';
                document.getElementById('empty').textContent = 'Warte auf Annahme...';
                return;
            }
            document.getElementById('mHead').style.display = 'flex';
            document.getElementById('msgs').style.display = 'flex';
            document.getElementById('inputBar').style.display = 'flex';
            document.getElementById('empty').style.display = 'none';
            const col = COLORS[(myAv||'?').charCodeAt(0)-65]||'#333';
            document.getElementById('mAv').textContent = myAv; document.getElementById('mAv').style.background = col;
            document.getElementById('mName').textContent = c.name;
            if (c.type === 'privat') {
                document.getElementById('mInfo').textContent = '@' + c.username;
            } else {
                document.getElementById('mInfo').textContent = 'Raum: ' + c.room;
            }
            renderMsgs();
        }

        function addMsg(chatId, text, me, name, av, file) {
            if (!chats[chatId]) return;
            chats[chatId].msgs.push({ text, me, name: name || (me ? myName : ''), av: av || (me ? myAv : '?'), time: Date.now(), file });
            chats[chatId].last = text || (file ? 'Datei' : '');
            chats[chatId].time = Date.now();
            if (!me && active !== chatId) chats[chatId].un = (chats[chatId].un || 0) + 1;
            save(); renderList(); if (active === chatId) renderMsgs();
        }

        function save() { ss('c_chats', chats); }

        function renderReqs() {
            const el = document.getElementById('requests'); el.innerHTML = '';
            Object.entries(requests).forEach(([key, r]) => {
                const d = document.createElement('div'); d.className = 'req';
                const col = COLORS[(r.av||'?').charCodeAt(0)-65]||'#333';
                d.innerHTML = `<div class="req-av" style="background:${col}">${r.av}</div><div class="req-info"><div class="req-name">${r.name}</div>${r.msg?'<div class="req-msg">'+r.msg+'</div>':''}</div><div class="req-btns"><button class="btn btn-small btn-green" onclick="acceptReq('${key}')">&#10003;</button><button class="btn btn-small btn-red" onclick="rejectReq('${key}')">&#10007;</button></div>`;
                el.appendChild(d);
            });
        }

        function renderList() {
            const el = document.getElementById('chats'); el.innerHTML = '';
            Object.values(chats).sort((a, b) => b.time - a.time).forEach(c => {
                const d = document.createElement('div');
                d.className = 'ci' + (active === c.id ? ' act' : '');
                const avChar = c.type === 'privat' ? '?' : '#';
                const avBg = c.type === 'privat' ? '#333' : '#0af';
                d.innerHTML = `<div class="ci-av" style="background:${avBg}">${avChar}</div><div class="ci-info"><div class="ci-name">${c.name}</div><div class="ci-last">${c.last||''}</div></div>${c.un?'<div class="unread">'+c.un+'</div>':''}`;
                d.onclick = () => open(c.id); el.appendChild(d);
            });
        }

        function renderMsgs() {
            if (!active || !chats[active]) return;
            const el = document.getElementById('msgs'); el.innerHTML = '';
            chats[active].msgs.forEach(m => {
                const d = document.createElement('div');
                d.className = 'm ' + (m.me ? 'm-me' : 'm-them');
                const t = new Date(m.time).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                let h = '';
                if (!m.me && m.name) h += '<div class="m-name">' + m.name + '</div>';
                if (m.text) h += m.text;
                if (m.file) {
                    const f = m.file;
                    if ((f.mime||'').startsWith('image/')) h += '<br><img src="'+f.data+'" onclick="pv(this.src)">';
                    else if ((f.mime||'').startsWith('video/')) h += '<br><video controls src="'+f.data+'"></video>';
                    else if ((f.mime||'').startsWith('audio/')) h += '<br><audio controls src="'+f.data+'"></audio>';
                    else h += '<br><a class="fl" href="'+f.data+'" download="'+f.name+'">'+f.name+'</a>';
                }
                h += '<div class="m-time">'+t+'</div>';
                d.innerHTML = h; el.appendChild(d);
            });
            el.scrollTop = el.scrollHeight;
        }

        async function send() {
            const inp = document.getElementById('msgIn'); const txt = inp.value.trim();
            if (!txt || !active) return;
            const c = chats[active];
            if (!c || !c.accepted) { alert('Warte auf Annahme'); return; }
            addMsg(active, txt, true, myName, myAv);
            let room = c.type === 'privat' ? 'user-' + c.username : 'grp-' + c.room;
            const ch = channels[room];
            if (ch) {
                await ch.send({ type: 'broadcast', event: 'msg', payload: { uid: myId, text: txt, name: myName, av: myAv, from: myUsername } });
            }
            inp.value = ''; inp.style.height = '38px';
        }

        function handleFile(f) {
            if (!f || !active) return;
            const c = chats[active];
            if (!c || !c.accepted) { alert('Warte auf Annahme'); return; }
            const r = new FileReader();
            r.onload = async () => {
                const fd = { name: f.name, mime: f.type||'application/octet-stream', size: f.size, data: r.result };
                addMsg(active, '', true, myName, myAv, fd);
                let room = c.type === 'privat' ? 'user-' + c.username : 'grp-' + c.room;
                const ch = channels[room];
                if (ch) {
                    await ch.send({ type: 'broadcast', event: 'msg', payload: { uid: myId, text: '', name: myName, av: myAv, from: myUsername, file: fd } });
                }
            };
            r.readAsDataURL(f);
        }

        function pv(s) { const p = document.getElementById('preview'); p.querySelector('img').src = s; p.style.display = 'flex'; }
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('modalUser').value = ''; document.getElementById('modalMsg').value = ''; document.getElementById('modalRoom').value = ''; }
        function delChat() { if (!active) return; if (!confirm('Loeschen?')) return; delete chats[active]; active = null; save(); renderList(); document.getElementById('mHead').style.display = 'none'; document.getElementById('msgs').style.display = 'none'; document.getElementById('inputBar').style.display = 'none'; document.getElementById('empty').style.display = 'flex'; document.getElementById('empty').textContent = 'Chat auswaehlen'; }

        document.getElementById('msgIn').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
        document.getElementById('fileIn').addEventListener('change', e => { handleFile(e.target.files[0]); e.target.value = ''; });
        document.getElementById('startBtn').addEventListener('click', start);
        document.getElementById('nameIn').addEventListener('keydown', e => { if (e.key === 'Enter') start(); });
        document.getElementById('userIn').addEventListener('keydown', e => { if (e.key === 'Enter') start(); });

        const saved = gs('c_name', ''), savedAv = gs('c_av', ''), savedId = gs('c_id', ''), savedUser = gs('c_user', '');
        if (saved && savedAv && savedUser) { myName = saved; myAv = savedAv; myId = savedId || genId(); myUsername = savedUser; go(); } else { initAv(); }
    </script>
</body>
</html>
